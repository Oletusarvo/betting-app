<!DOCTYPE html>
<head>
    <title>Login to betting app</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<html>
    <body id="index-body">
        <div class="content-box">
            <h2>Betting App</h2><br/>
        </div>

        <div class="content-box">
            
            <form method="post">
                <label for="uname" id="label-username">Username</label><br/>
                <input name="uname" id="input-username" placeholder="username"><br/>
                <label for="psw id="label-password">Password</label><br/>
                <input name="psw" type="password" id="input-password" placeholder="password"><br/>
                <button type="submit">Submit</button>
            </form>
        </div>

        <script src="js/index.js"></script>
       
    </body>
</html>
